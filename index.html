<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portal - Learn Something New</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <h2>CoursePortal</h2>
                </div>
                <button class="mobile-toggle" id="mobile-toggle">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
            
            <div class="progress-container">
                <div class="progress-text">
                    <span>Course Progress</span>
                    <span id="progress-percentage">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>
            </div>

            <nav class="course-modules" id="course-modules">
                <!-- Modules will be dynamically injected here via JS -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-nav">
                <h1 id="current-lesson-title">Welcome to the Course</h1>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Student&background=0D8ABC&color=fff" alt="User Profile">
                </div>
            </header>

            <div class="video-container">
                <div class="video-wrapper">
                    <!-- YouTube Embed iframe will be injected here -->
                    <div id="video-player-container" class="placeholder-video">
                        <i class="fa-brands fa-youtube"></i>
                        <p>Select a lesson from the menu to begin learning</p>
                    </div>
                </div>
            </div>

            <div class="lesson-details">
                <div class="lesson-header">
                    <h2 id="lesson-detail-title">Course Introduction</h2>
                    <button id="mark-complete-btn" class="btn-complete" disabled>
                        <i class="fa-solid fa-check"></i> Mark as Complete
                    </button>
                </div>
                <div class="lesson-description" id="lesson-description">
                    <p>Welcome! In this course, you will learn the fundamentals and advance your skills. Browse the modules on the left and select a lesson to start.</p>
                </div>
                
                <div class="lesson-navigation">
                    <button id="prev-lesson-btn" class="btn-secondary" disabled>
                        <i class="fa-solid fa-arrow-left"></i> Previous Lesson
                    </button>
                    <button id="next-lesson-btn" class="btn-primary" disabled>
                        Next Lesson <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
